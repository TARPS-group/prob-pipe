site_name: ProbPipe
site_description: Probabilistic pipelines with automated uncertainty quantification
site_url: https://tarps-group.github.io/prob-pipe
repo_url: https://github.com/TARPS-group/prob-pipe
repo_name: TARPS-group/prob-pipe

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - content.code.copy

hooks:
  - mkdocs_hooks.py

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            merge_init_into_class: true
            # Render every ``:::`` directive's root heading at h3 by default.
            # This puts symbol headings one level below manual ``##`` section
            # headings, so the right-rail TOC indents symbols under their
            # section header. Class members are then h4, hidden by toc_depth.
            heading_level: 3
  - mkdocs-jupyter:
      ignore_h1_titles: true
      execute: false


markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
      # Right-rail TOC shows h1, h2 (sections) and h3 (mkdocstrings symbol
      # root headings). Class methods/properties are rendered at h4 by
      # mkdocstrings and are excluded by this depth limit.
      toc_depth: 3

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Tutorials:
    - Getting Started: tutorials/getting_started.ipynb
    - Flexible Inference with condition_on: tutorials/flexible_inference.ipynb
  - User Guide:
    - Overview: user_guide.md
    - Distribution basics: examples/01_distributions.ipynb
    - Records and Record Distributions: examples/02_records.ipynb
    - Broadcasting and workflow functions: examples/03_broadcasting.ipynb
    - Joint distributions: examples/04_joint_distributions.ipynb
    - External backends: examples/05_external_backends.ipynb
    - Converting between representations: examples/06_converting_representations.ipynb
    - Sequential updating: examples/07_sequential_updating.ipynb
    - JAX interop (gradients, jit, vmap): examples/08_jax_interop.ipynb
    - Bagged posteriors: examples/09_bagged_posteriors.ipynb
    - Random functions and Gaussian emulators: examples/10_random_functions_and_emulators.ipynb
  - API Reference:
    - Overview: api/index.md
    - Operations: api/operations.md
    - Distributions:
      - api/distributions/index.md
      - Continuous: api/distributions/continuous.md
      - Discrete: api/distributions/discrete.md
      - Multivariate: api/distributions/multivariate.md
      - Composite and joint: api/distributions/composite.md
      - Empirical and bootstrap: api/distributions/empirical.md
      - Random functions: api/distributions/random_functions.md
    - Records and data: api/records.md
    - Modeling and inference: api/inference.md
    - Workflows and orchestration: api/workflows.md
    - Constraints and bijectors: api/constraints.md
    - Conversion and interop: api/converters.md
    - Provenance: api/provenance.md
    - Extending ProbPipe: api/extending.md
    - Internals: api/internals.md
