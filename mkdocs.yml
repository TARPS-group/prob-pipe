site_name: ProbPipe
site_description: Probabilistic pipelines with automated uncertainty quantification
site_url: https://tarps-group.github.io/prob-pipe
repo_url: https://github.com/TARPS-group/prob-pipe
repo_name: TARPS-group/prob-pipe

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            merge_init_into_class: true
  - mkdocs-jupyter:
      ignore_h1_titles: true
      execute: false


markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Tutorials:
    - Getting Started: tutorials/getting_started.ipynb
    - Flexible Inference with condition_on: tutorials/flexible_inference.ipynb
  - Reference Notebooks:
    - Overview: reference_notebooks.md
    - Distribution basics: examples/01_distributions.ipynb
    - Records and the Record family: examples/02_records.ipynb
    - Broadcasting and workflow functions: examples/03_broadcasting.ipynb
    - Joint distributions: examples/04_joint_distributions.ipynb
    - External backends: examples/05_external_backends.ipynb
    - Converting between representations: examples/06_converting_representations.ipynb
    - Sequential updating: examples/07_sequential_updating.ipynb
    - JAX interop (gradients, jit, vmap): examples/08_jax_interop.ipynb
    - Bagged posteriors: examples/09_bagged_posteriors.ipynb
    - Random functions and Gaussian emulators: examples/10_random_functions_and_emulators.ipynb
  - API Reference:
    - Operations: api/operations.md
    - Protocols: api/protocols.md
    - Distributions: api/distributions.md
    - Joint Distributions: api/joint.md
    - Transformations: api/transformed.md
    - Workflows: api/workflows.md
    - Inference: api/inference.md
    - Validation: api/validation.md
    - Converters: api/converters.md
    - Provenance: api/provenance.md
    - Random Functions: api/random_functions.md
    - Constraints: api/constraints.md
    - Internals: api/internals.md
