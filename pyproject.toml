[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "probpipe"
version = "0.1.0"
description = "Tools for probabilistic data-processing pipelines"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
  { name = "Jonathan Huggins", email = "huggins@bu.edu" },
  { name = "Yongho Lim",    email = "ylim2@bu.edu" },
  { name = "Can Erozer",    email = "caner@bu.edu" },
]  # See AUTHORS file for full list
dependencies = [
  "jax>=0.4.35",
  "jaxlib>=0.4.35",
  "tfp-nightly==0.26.0.dev20260315",
]

[project.optional-dependencies]
prefect = ["prefect>=3"]
viz = ["graphviz", "matplotlib"]
docs = [
  "mkdocs-material",
  "mkdocstrings[python]",
  "mkdocs-jupyter<0.26",
]
dev = [
  "probpipe[prefect,viz,docs]",
  "pytest>=7",
  "pytest-cov",
  "ruff",
  "ipykernel",
  "jupyter",
  "nbformat",
]

[project.urls]
"Repository" = "https://github.com/TARPS-group/prob-pipe"
"Documentation" = "https://tarps-group.github.io/prob-pipe/"
"Changelog" = "https://github.com/TARPS-group/prob-pipe/blob/main/CHANGELOG.md"

[tool.setuptools.packages.find]
where = ["."]
include = ["probpipe*"]
exclude = ["tests*", "docs*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --cov=probpipe --cov-report=term-missing --cov-fail-under=0"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "UP",   # pyupgrade
  "B",    # flake8-bugbear
  "SIM",  # flake8-simplify
  "RUF",  # ruff-specific rules
]
ignore = [
  "E501",   # line too long (handled by formatter)
  "B905",   # zip without strict= (not always needed)
  "SIM108", # ternary operator (readability preference)
]

[tool.ruff.lint.isort]
known-first-party = ["probpipe"]