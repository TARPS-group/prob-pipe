name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for git diff

      - name: Detect changed files and resolve test targets
        id: changed
        run: |
          # On PRs, diff against the base branch; on pushes, diff against the previous commit.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="${{ github.event.before }}"
          fi

          CHANGED=$(git diff --name-only --diff-filter=ACMRT "$BASE"...HEAD -- '*.py' || true)
          echo "Changed .py files:"
          echo "$CHANGED"

          # If foundational files changed, run the full suite.
          RUN_ALL=false
          for f in $CHANGED; do
            case "$f" in
              pyproject.toml|setup.cfg|setup.py|tests/conftest.py|probpipe/__init__.py)
                RUN_ALL=true ;;
            esac
          done

          if [ -z "$CHANGED" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "run_all=false" >> "$GITHUB_OUTPUT"
            echo "No .py files changed — skipping tests."
          elif [ "$RUN_ALL" = "true" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "run_all=true" >> "$GITHUB_OUTPUT"
            echo "Will run ALL tests (foundational change detected)."
          else
            # Collect test files to run.
            TEST_FILES=""

            for f in $CHANGED; do
              # If the changed file is already a test file, include it directly.
              if echo "$f" | grep -qE '^tests/.*\.py$'; then
                if [ -f "$f" ]; then
                  TEST_FILES="$TEST_FILES $f"
                fi
                continue
              fi

              # Map source file to test file(s).
              # e.g. probpipe/core/record.py -> tests/test_record.py
              basename=$(basename "$f" .py)
              for candidate in $(find tests -name "test_${basename}.py" -o -name "test_${basename}_*.py" 2>/dev/null); do
                TEST_FILES="$TEST_FILES $candidate"
              done
            done

            # Deduplicate
            TEST_FILES=$(echo "$TEST_FILES" | tr ' ' '\n' | sort -u | tr '\n' ' ' | xargs)

            if [ -z "$TEST_FILES" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "run_all=false" >> "$GITHUB_OUTPUT"
              echo "No matching test files found — skipping tests."
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "run_all=false" >> "$GITHUB_OUTPUT"
              echo "test_files=$TEST_FILES" >> "$GITHUB_OUTPUT"
              echo "Will run: $TEST_FILES"
            fi
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # sbijax 0.3.6 hard-pins arviz==1.0.0, but pymc (no released version
          # yet supports arviz 1.0 — the switch landed on the v6 branch in
          # pymc-devs/pymc#8019 but pymc 6.0 isn't out) and nutpie require
          # arviz<1.0. Install the sbi extra's runtime deps by hand and use
          # --no-deps for sbijax itself so pip doesn't try to resolve its
          # strict arviz pin. Revisit once pymc 6.0 ships.
          pip install -e ".[dev,nutpie]"
          pip install --no-deps sbijax
          pip install blackjax diffrax dm-haiku einops grain jrnmm optax seaborn surjectors tqdm

      - name: Run tests (changed files only)
        if: steps.changed.outputs.skip != 'true' && steps.changed.outputs.run_all == 'false'
        run: |
          pytest ${{ steps.changed.outputs.test_files }} --cov-report=xml --cov-report=html

      - name: Run tests (full suite)
        if: steps.changed.outputs.skip != 'true' && steps.changed.outputs.run_all == 'true'
        run: |
          pytest --cov-report=xml --cov-report=html

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: TARPS-group/prob-pipe

      - name: Upload coverage HTML report
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

  notebooks:
    # Execute every docs/examples notebook to keep the reference set
    # honest against the current codebase. Separate job so the
    # ~10-15 min notebook pass does not gate the unit-test matrix.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,nutpie]"
          pip install --no-deps sbijax
          pip install blackjax diffrax dm-haiku einops grain jrnmm optax seaborn surjectors tqdm

      - name: Execute every docs/examples notebook
        run: |
          set -euo pipefail
          for nb in docs/examples/*.ipynb; do
            echo "--- executing $nb ---"
            python -m nbconvert --to notebook --execute \
              --ExecutePreprocessor.timeout=900 --output /tmp/out.ipynb "$nb"
          done
