name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # sbijax 0.3.6 hard-pins arviz==1.0.0, but pymc (no released version
          # yet supports arviz 1.0 — the switch landed on the v6 branch in
          # pymc-devs/pymc#8019 but pymc 6.0 isn't out) and nutpie require
          # arviz<1.0. Install the sbi extra's runtime deps by hand and use
          # --no-deps for sbijax itself so pip doesn't try to resolve its
          # strict arviz pin. Revisit once pymc 6.0 ships.
          pip install -e ".[dev,nutpie]"
          pip install --no-deps sbijax
          pip install blackjax diffrax dm-haiku einops grain jrnmm optax seaborn surjectors tqdm

      - name: Run tests with coverage
        run: |
          pytest --cov-report=xml --cov-report=html

      - name: Upload coverage reports to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: TARPS-group/prob-pipe

      - name: Upload coverage HTML report
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
